<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Volleyball Lineup Tracker</title>
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 0.5rem;
      background: #111;
      color: #f5f5f5;
      touch-action: manipulation;
    }

    h1 {
      font-size: 1.3rem;
      margin: 0.5rem 0;
      text-align: center;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.5rem;
      background: #1b1b1b;
    }

    section {
      margin-bottom: 0.6rem;
    }

    #import-area {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    #lineup-input {
      width: 100%;
      min-height: 70px;
      background: #111;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.4rem;
      font-size: 0.8rem;
    }

    button {
      padding: 0.3rem 0.6rem;
      margin: 0.1rem;
      border-radius: 4px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #f5f5f5;
      font-size: 0.8rem;
    }

    button:disabled {
      opacity: 0.4;
    }

    button.primary {
      background: #2b7cff;
      border-color: #2b7cff;
      color: #fff;
    }

    button.danger {
      background: #b00020;
      border-color: #b00020;
      color: #fff;
    }

    button.toggle-on {
      background: #0e8a3a;
      border-color: #0e8a3a;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.3rem 0.4rem;
    }

    .score {
      font-size: 1rem;
      font-weight: 600;
    }

    .score span {
      margin-right: 0.3rem;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      justify-content: center;
      margin-top: 0.3rem;
    }

    .layout {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .panel {
      flex: 1 1 200px;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.4rem;
      min-height: 120px;
    }

    .panel h2 {
      font-size: 0.9rem;
      margin: 0 0 0.3rem 0;
    }

    #court {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 72px;
      gap: 0.25rem;
    }

    .court-cell {
      border-radius: 6px;
      border: 1px solid #444;
      background: #18232e;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      padding: 0.2rem;
      font-size: 0.7rem;
      text-align: center;
    }

    .court-cell.empty {
      opacity: 0.5;
      font-style: italic;
    }

    .pos-label {
      font-size: 0.65rem;
      opacity: 0.8;
      text-align: left;
      margin-bottom: 0.1rem;
    }

    .player-card {
      width: 100%;
      border-radius: 6px;
      padding: 0.2rem;
      border: 1px solid #555;
      background: #222;
      cursor: pointer;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .player-name {
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.1rem;
    }

    .player-meta {
      font-size: 0.7rem;
      opacity: 0.85;
    }

    #bench-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .sub-pending {
      border: 2px solid #f4d03f !important;
      box-shadow: 0 0 4px #f4d03f;
    }

    #subs-log-list {
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.75rem;
    }

    .sub-entry {
      padding: 0.15rem 0;
      border-bottom: 1px solid #333;
    }

    .small-label {
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .serving-indicator {
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      border: 1px solid #555;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .serving-us {
      background: #0e8a3a;
    }

    .serving-them {
      background: #8a4b0e;
    }

    .note {
      font-size: 0.7rem;
      opacity: 0.8;
    }

    .saved-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.25rem;
    }

    .saved-controls select {
      font-size: 0.75rem;
      max-width: 180px;
    }
  </style>
</head>
<body>
<div class="app">
  <h1>Volleyball Lineup Tracker</h1>

  <!-- Lineup Import -->
  <section id="import-area">
    <label for="lineup-input" class="small-label">
      Lineup (one name per line in serving order) then bench (any order).
    </label>
    <textarea id="lineup-input" placeholder="e.g.
Setter
Middle 1
Outside 1
Opposite
Middle 2
Outside 2
DS 1
DS 2"></textarea>
    <div>
      <button id="load-lineup-btn" class="primary">Load / Update Lineup</button>
    </div>
  </section>

  <!-- Status & Controls -->
  <section>
    <div class="status-row">
      <div>Set: <span id="set-number">1</span></div>
      <div class="score">
        <span>Us: <span id="our-score">0</span></span>
        <span>Them: <span id="their-score">0</span></span>
      </div>
      <div>
        <span class="small-label">Serving:</span>
        <span id="serving-indicator" class="serving-indicator serving-us">Us</span>
      </div>
      <div class="small-label">
        Points are total rallies played on court, across all sets.
      </div>
    </div>

    <div class="controls-row">
      <button id="rotate-back-btn">Rotate ◀︎</button>
      <button id="rotate-forward-btn">Rotate ▶︎</button>

      <button id="score-us-btn" class="primary">Us +1</button>
      <button id="score-them-btn" class="primary">Them +1</button>

      <button id="undo-btn">Undo</button>
      <button id="new-set-btn">New Set</button>
      <button id="reset-btn" class="danger">Reset App</button>

      <button id="sub-mode-btn">Sub Mode: Off</button>
    </div>
  </section>

  <!-- Saved games -->
  <section>
    <div class="status-row">
      <div class="small-label">Saved Games (stored on this device)</div>
      <div class="saved-controls">
        <button id="save-game-btn">Save Game</button>
        <select id="saved-games-select"></select>
        <button id="load-game-btn">Load</button>
        <button id="delete-game-btn">Delete</button>
      </div>
    </div>
  </section>

  <!-- Layout: Court / Bench / Subs -->
  <section class="layout">
    <div class="panel">
      <h2>Court</h2>
      <div id="court"></div>
    </div>

    <div class="panel">
      <h2>Bench</h2>
      <div id="bench-list"></div>
    </div>

    <div class="panel">
      <h2>Substitutions Log</h2>
      <div id="subs-log-list"></div>
    </div>
  </section>
</div>

<script>
  // --------- Storage keys ---------
  const STORAGE_KEY_AUTO = 'vb_lineup_auto_state_v1';
  const STORAGE_KEY_SAVES = 'vb_lineup_saved_states_v1';

  // --------- State management ---------

  function createInitialState() {
    return {
      players: [],          // [{id, name, points}]
      rotation: [],         // [playerId at pos1, pos2, ..., pos6]
      bench: [],            // [playerId,...]
      ourScore: 0,
      theirScore: 0,
      serving: 'us',        // 'us' | 'them'
      setNumber: 1,
      subMode: false,
      pendingSub: null,     // {group: 'court'|'bench', playerId}
      substitutions: [],    // {inId, outId, setNumber, score}
      nextPlayerId: 1
    };
  }

  let state = createInitialState();
  let historyStack = [];

  function cloneState(s) {
    return JSON.parse(JSON.stringify(s));
  }

  function pushHistory() {
    historyStack.push(cloneState(state));
    updateUndoButton();
  }

  function restoreState(snapshot) {
    state = snapshot;
    render();
  }

  function updateUndoButton() {
    const undoBtn = document.getElementById('undo-btn');
    undoBtn.disabled = historyStack.length === 0;
  }

  // --------- Local storage helpers ---------

  function saveAutoState() {
    try {
      localStorage.setItem(STORAGE_KEY_AUTO, JSON.stringify(state));
    } catch (e) {
      // ignore storage errors
    }
  }

  function loadAutoStateIfAny() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY_AUTO);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') {
          state = parsed;
        }
      }
    } catch (e) {
      state = createInitialState();
    }
  }

  function getSavedGames() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY_SAVES);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      return [];
    }
  }

  function setSavedGames(list) {
    try {
      localStorage.setItem(STORAGE_KEY_SAVES, JSON.stringify(list));
    } catch (e) {
      // ignore
    }
  }

  function refreshSavedGamesDropdown() {
    const sel = document.getElementById('saved-games-select');
    const loadBtn = document.getElementById('load-game-btn');
    const delBtn = document.getElementById('delete-game-btn');
    if (!sel) return;

    const saves = getSavedGames();
    sel.innerHTML = '';

    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = saves.length ? 'Select saved game…' : 'No saved games';
    sel.appendChild(placeholder);

    saves.forEach(entry => {
      const opt = document.createElement('option');
      opt.value = String(entry.id);
      const dateStr = new Date(entry.timestamp).toLocaleString();
      opt.textContent = `${entry.name} (${dateStr})`;
      sel.appendChild(opt);
    });

    const hasSaves = saves.length > 0;
    sel.disabled = !hasSaves;
    loadBtn.disabled = !hasSaves;
    delBtn.disabled = !hasSaves;
  }

  // --------- Helpers ---------

  function getPlayerById(id) {
    return state.players.find(p => p.id === id) || null;
  }

  function getPlayerName(id) {
    const p = getPlayerById(id);
    return p ? p.name : '';
  }

  function incrementPointsForOnCourtPlayers() {
    state.rotation.forEach(id => {
      if (!id) return;
      const p = getPlayerById(id);
      if (p) p.points += 1;
    });
  }

  // rotation index 0..5 => positions 1..6
  function getPlayerIdAtPosition(posNumber) {
    const idx = posNumber - 1;
    return state.rotation[idx];
  }

  // --------- Actions ---------

  function loadLineupFromTextarea() {
    const text = document.getElementById('lineup-input').value;
    const rawLines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);

    if (rawLines.length === 0) {
      alert("Please enter at least one player name.");
      return;
    }

    pushHistory();

    const oldPlayersByName = {};
    state.players.forEach(p => {
      oldPlayersByName[p.name] = p;
    });

    const newPlayers = [];
    let nextId = 1;

    for (const name of rawLines) {
      let existing = oldPlayersByName[name];
      if (!existing) {
        existing = { id: nextId, name: name, points: 0 };
      } else {
        existing = { id: nextId, name: existing.name, points: existing.points };
      }
      newPlayers.push(existing);
      nextId += 1;
    }

    state.players = newPlayers;
    state.nextPlayerId = nextId;

    const ids = newPlayers.map(p => p.id);
    // First six are positions 1..6
    state.rotation = ids.slice(0, 6);
    state.bench = ids.slice(6);

    state.pendingSub = null;

    render();
  }

  // Volleyball rotation: 1 -> 6 -> 5 -> 4 -> 3 -> 2 -> 1
  // Internally rotation[0] = pos1, ..., rotation[5] = pos6

  // "Forward" = real volleyball rotation (1 to 6)
  function rotateForward() {
    if (state.rotation.length < 2) return;
    pushHistory();
    // Left-rotate: [p1,p2,p3,p4,p5,p6] -> [p2,p3,p4,p5,p6,p1]
    const first = state.rotation[0];
    state.rotation = state.rotation.slice(1).concat([first]);
    render();
  }

  // "Backward" = reverse of that rotation (6 back to 1)
  function rotateBackward() {
    if (state.rotation.length < 2) return;
    pushHistory();
    // Right-rotate: [p1,p2,p3,p4,p5,p6] -> [p6,p1,p2,p3,p4,p5]
    const last = state.rotation[state.rotation.length - 1];
    state.rotation = [last].concat(state.rotation.slice(0, state.rotation.length - 1));
    render();
  }

  function scorePoint(team) {
    pushHistory();

    if (team === 'us') {
      if (state.serving === 'them') {
        // sideout: they served, we win rally -> we get serve & rotate (1 -> 6)
        state.serving = 'us';
        if (state.rotation.length >= 2) {
          const first = state.rotation[0];
          state.rotation = state.rotation.slice(1).concat([first]);
        }
      }
      state.ourScore += 1;
    } else {
      if (state.serving === 'us') {
        // we served, lost rally -> they get serve, no rotation for us
        state.serving = 'them';
      }
      state.theirScore += 1;
    }

    incrementPointsForOnCourtPlayers();
    render();
  }

  function toggleServing() {
    pushHistory();
    state.serving = (state.serving === 'us') ? 'them' : 'us';
    render();
  }

  function toggleSubMode() {
    pushHistory();
    state.subMode = !state.subMode;
    state.pendingSub = null;
    render();
  }

  function handlePlayerClick(group, playerId) {
    if (!state.subMode) return;

    const pending = state.pendingSub;
    if (!pending) {
      state.pendingSub = { group, playerId };
      render();
      return;
    }

    if (pending.playerId === playerId || pending.group === group) {
      state.pendingSub = null;
      render();
      return;
    }

    let courtId, benchId;
    if (group === 'court') {
      courtId = playerId;
      benchId = pending.playerId;
    } else {
      courtId = pending.playerId;
      benchId = playerId;
    }

    if (!state.rotation.includes(courtId) || !state.bench.includes(benchId)) {
      state.pendingSub = null;
      render();
      return;
    }

    pushHistory();

    state.rotation = state.rotation.map(id => id === courtId ? benchId : id);
    state.bench = state.bench.map(id => id === benchId ? courtId : id);

    state.substitutions.unshift({
      inId: benchId,
      outId: courtId,
      setNumber: state.setNumber,
      score: state.ourScore + "-" + state.theirScore
    });

    state.pendingSub = null;
    render();
  }

  function newSet() {
    pushHistory();
    state.setNumber += 1;
    state.ourScore = 0;
    state.theirScore = 0;
    state.serving = 'us';
    state.pendingSub = null;
    render();
  }

  function resetApp() {
    if (!confirm("Reset app? This will clear scores, sets, points, lineup, substitutions, and saved games.")) {
      return;
    }
    try {
      localStorage.removeItem(STORAGE_KEY_AUTO);
      localStorage.removeItem(STORAGE_KEY_SAVES);
    } catch (e) {}
    state = createInitialState();
    historyStack = [];
    render();
  }

  function undoLast() {
    if (historyStack.length === 0) return;
    const snapshot = historyStack.pop();
    restoreState(snapshot);
  }

  // --------- Saved games actions ---------

  function saveCurrentGameAsSnapshot() {
    const name = prompt("Name this game (e.g., 'vs Panthers Set 2'):");
    if (!name) return;
    const saves = getSavedGames();
    const now = Date.now();
    const entry = {
      id: now,
      name: name,
      timestamp: now,
      state: cloneState(state)
    };
    saves.push(entry);
    setSavedGames(saves);
    refreshSavedGamesDropdown();
  }

  function loadSelectedSavedGame() {
    const sel = document.getElementById('saved-games-select');
    if (!sel) return;
    const idStr = sel.value;
    if (!idStr) return;

    const saves = getSavedGames();
    const entry = saves.find(e => String(e.id) === idStr);
    if (!entry) return;

    if (!confirm(`Load "${entry.name}"? Current game state will be replaced.`)) {
      return;
    }

    pushHistory();
    state = cloneState(entry.state);
    render();
  }

  function deleteSelectedSavedGame() {
    const sel = document.getElementById('saved-games-select');
    if (!sel) return;
    const idStr = sel.value;
    if (!idStr) return;

    const saves = getSavedGames();
    const entry = saves.find(e => String(e.id) === idStr);
    if (!entry) return;

    if (!confirm(`Delete saved game "${entry.name}"? This cannot be undone.`)) {
      return;
    }

    const remaining = saves.filter(e => String(e.id) !== idStr);
    setSavedGames(remaining);
    refreshSavedGamesDropdown();
  }

  // --------- Rendering ---------

  function render() {
    document.getElementById('our-score').textContent = state.ourScore;
    document.getElementById('their-score').textContent = state.theirScore;
    document.getElementById('set-number').textContent = state.setNumber;

    const servingElem = document.getElementById('serving-indicator');
    servingElem.textContent = state.serving === 'us' ? 'Us' : 'Them';
    servingElem.classList.toggle('serving-us', state.serving === 'us');
    servingElem.classList.toggle('serving-them', state.serving === 'them');

    const subBtn = document.getElementById('sub-mode-btn');
    if (state.subMode) {
      subBtn.textContent = "Sub Mode: On";
      subBtn.classList.add('toggle-on');
    } else {
      subBtn.textContent = "Sub Mode: Off";
      subBtn.classList.remove('toggle-on');
    }

    updateUndoButton();

    // Court: position layout [4,3,2,5,6,1] = top-left -> bottom-right
    const positionOrder = [4, 3, 2, 5, 6, 1];
    const court = document.getElementById('court');
    court.innerHTML = '';
    const pending = state.pendingSub;

    for (let i = 0; i < 6; i++) {
      const posNumber = positionOrder[i];
      const cell = document.createElement('div');
      cell.className = 'court-cell';

      const label = document.createElement('div');
      label.className = 'pos-label';
      label.textContent = "Pos " + posNumber;
      cell.appendChild(label);

      const playerId = getPlayerIdAtPosition(posNumber);
      if (!playerId) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'player-card empty';
        emptyDiv.textContent = 'Empty';
        cell.appendChild(emptyDiv);
      } else {
        const player = getPlayerById(playerId);
        const card = document.createElement('div');
        card.className = 'player-card';
        card.dataset.playerId = playerId;
        card.dataset.group = 'court';

        if (pending && pending.group === 'court' && pending.playerId === playerId) {
          card.classList.add('sub-pending');
        }

        const nameDiv = document.createElement('div');
        nameDiv.className = 'player-name';
        nameDiv.textContent = player.name;

        const metaDiv = document.createElement('div');
        metaDiv.className = 'player-meta';
        metaDiv.textContent = "Pts: " + player.points;

        card.appendChild(nameDiv);
        card.appendChild(metaDiv);

        card.addEventListener('click', () => handlePlayerClick('court', playerId));

        cell.appendChild(card);
      }

      court.appendChild(cell);
    }

    // Bench
    const benchList = document.getElementById('bench-list');
    benchList.innerHTML = '';

    state.bench.forEach(id => {
      const player = getPlayerById(id);
      if (!player) return;
      const card = document.createElement('div');
      card.className = 'player-card';
      card.dataset.playerId = id;
      card.dataset.group = 'bench';

      if (pending && pending.group === 'bench' && pending.playerId === id) {
        card.classList.add('sub-pending');
      }

      const nameDiv = document.createElement('div');
      nameDiv.className = 'player-name';
      nameDiv.textContent = player.name;

      const metaDiv = document.createElement('div');
      metaDiv.className = 'player-meta';
      metaDiv.textContent = "Pts: " + player.points;

      card.appendChild(nameDiv);
      card.appendChild(metaDiv);

      card.addEventListener('click', () => handlePlayerClick('bench', id));

      benchList.appendChild(card);
    });

    // Subs log
    const subsLog = document.getElementById('subs-log-list');
    subsLog.innerHTML = '';
    state.substitutions.forEach(entry => {
      const div = document.createElement('div');
      div.className = 'sub-entry';
      const inName = getPlayerName(entry.inId);
      const outName = getPlayerName(entry.outId);
      div.textContent = `Set ${entry.setNumber} @ ${entry.score}: ${inName} in for ${outName}`;
      subsLog.appendChild(div);
    });

    // Save current state automatically & refresh saved list UI
    saveAutoState();
    refreshSavedGamesDropdown();
  }

  // --------- Event wiring ---------

  document.addEventListener('DOMContentLoaded', () => {
    // Try to restore previous automatic state first
    loadAutoStateIfAny();

    document.getElementById('load-lineup-btn').addEventListener('click', loadLineupFromTextarea);
    document.getElementById('rotate-forward-btn').addEventListener('click', rotateForward);
    document.getElementById('rotate-back-btn').addEventListener('click', rotateBackward);
    document.getElementById('score-us-btn').addEventListener('click', () => scorePoint('us'));
    document.getElementById('score-them-btn').addEventListener('click', () => scorePoint('them'));
    document.getElementById('serving-indicator').addEventListener('click', toggleServing);
    document.getElementById('sub-mode-btn').addEventListener('click', toggleSubMode);
    document.getElementById('new-set-btn').addEventListener('click', newSet);
    document.getElementById('reset-btn').addEventListener('click', resetApp);
    document.getElementById('undo-btn').addEventListener('click', undoLast);

    document.getElementById('save-game-btn').addEventListener('click', saveCurrentGameAsSnapshot);
    document.getElementById('load-game-btn').addEventListener('click', loadSelectedSavedGame);
    document.getElementById('delete-game-btn').addEventListener('click', deleteSelectedSavedGame);

    render();
  });
</script>
</body>
</html>
